name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Batalkan run lama pada branch yang sama saat ada push baru.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Instal dependensi
        run: npm ci

      - name: Syntax check (lint)
        run: npm run check

      - name: Smoke test (server + /api/health)
        run: npm run smoke
